          <h1 style="font-family: 'Montserrat', sans-serif; font-size: 36px; margin-bottom: 8px;">PROVIO</h1>
          <p style="font-size: 20px; color: #45D0B9; margin-bottom: 8px;">Futures, Proven</p>
          <p style="font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 40px;">Intelligence and pathways for the AI transition</p>

          <h2 style="font-family: 'Montserrat', sans-serif; font-size: 24px; color: #45D0B9; margin-bottom: 12px;">Education Intelligence — Free AI Readiness Diagnostic</h2>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 12px;">How ready is your college for what's coming? Complete a free 15-minute assessment and receive a personalised 25+ page AI readiness report.</p>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 24px;">The diagnostic covers 9 dimensions: Strategic Direction, Teaching and Assessment, Pedagogical Transformation, Staff Readiness, Operations, Ethics and Governance, Workforce Alignment, Student Experience, and Financial Sustainability. Your report includes an AI Readiness Index, maturity level, personalised recommendations, top 5 risks, top 5 quickest wins, a 90-day implementation plan, a 12-month transformation roadmap, strategic questions your senior team is not yet asking, and sector benchmarking.</p>

          <h2 style="font-family: 'Montserrat', sans-serif; font-size: 24px; color: #F97316; margin-bottom: 12px;">Business Intelligence — Free AI Adoption Assessment</h2>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 12px;">Could AI save your business 5 hours a week? Take this free 3-minute assessment to find out where AI could help.</p>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 24px;">Answer 11 questions about your business and where you spend time. Get an initial insight highlighting where AI could make the biggest difference. Then go deeper with a trained associate who carries out a full professional AI audit — completely free.</p>

          <h2 style="font-family: 'Montserrat', sans-serif; font-size: 24px; color: #45D0B9; margin-bottom: 12px;">AI Horizon Map 2026–2032</h2>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 24px;">Four forces, eight time windows, six years mapped. Explore how technology and AI capability, policy and regulation, the labour market and economy, and student and employer expectations will reshape further education and the UK economy. From multimodal AI going mainstream and the DfE Leadership Toolkit in H1 2026, through AI agents entering the workplace in H2 2026, qualification reform accelerating in H1 2027, the first enrolment shock in H2 2027, AI reasoning at professional level in H1 2028, the AI-native cohort arriving in H1 2029, the human premium emerging by H1 2030, to the transformed economy of 2031.</p>

          <h2 style="font-family: 'Montserrat', sans-serif; font-size: 24px; margin-bottom: 12px;">PROVIO Insight: The Two Shocks</h2>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 12px;">Why the rush to the trades is only half the answer — and what FE colleges need to prepare for next.</p>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 24px;">The rush to the trades feels like the right response to AI. It is — but only for now. The first shock is already here: generative AI has collapsed the cost of cognitive work. The second shock — embodied robotics entering unstructured work environments — is closer than most colleges are planning for. Breakthroughs in Vision-Language-Action models have fundamentally changed the trajectory of robotics. The FE graduate of 2032 is not someone who carries bricks or pulls cable — they are an orchestrator who surveys sites, deploys collaborative robots, and audits results. Three capabilities survive both shocks: cyber-physical orchestration, unstructured problem-solving, and hyper-human empathy.</p>

          <h2 style="font-family: 'Montserrat', sans-serif; font-size: 24px; margin-bottom: 12px;">About PROVIO</h2>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 12px;">PROVIO was founded by a West Midlands hospitality operator employing over 450 people. That frontline experience made one thing clear: the gap between what AI can do and what most local businesses and colleges are ready for is growing wider — and the people most affected have the least support.</p>
          <p style="color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 24px;">Based in the West Midlands, PROVIO works alongside delivery partners across further education and skills development. Our audit methodology is built to professional standards and our diagnostics are grounded in current sector research from Ofsted, Jisc, Skills England, the Gatsby Foundation, and the DfE. AI is already here, and the pace of change is not slowing down. PROVIO is here to help the people and institutions closest to the impact navigate what comes next — practically, honestly, and together. Free and independent — always.</p>
